<!-- app.component.html -->

<!-- WARM-UP SCREEN — visible mientras el backend de Render duerme -->
<div class="warmup-screen" *ngIf="backendCargando">
  <div class="warmup-card">
    <div class="warmup-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M12 3C12 3 6 9 6 14C6 17.31 8.69 20 12 20C15.31 20 18 17.31 18 14C18 9 12 3Z" fill="white"/>
        <circle cx="12" cy="14" r="3" fill="#0f172a"/>
      </svg>
    </div>
    <h2 class="warmup-title">EcoSensor</h2>
    <div class="warmup-dots">
      <span></span><span></span><span></span>
    </div>
    <p class="warmup-msg">{{ mensajeWarmup }}</p>
    <div class="warmup-bar"><div class="warmup-fill"></div></div>
    <p class="warmup-hint">
      El servidor se reactiva automáticamente.<br>
      Solo tarda en el primer acceso del día.
    </p>
  </div>
</div>

<!-- APP PRINCIPAL — visible cuando el backend respondió -->
<div class="app-layout" *ngIf="!backendCargando">

  <!-- Navbar lateral — solo en páginas internas -->
  <app-navbar *ngIf="mostrarNavbar"></app-navbar>

  <!-- Contenido principal -->
  <main class="app-content" [class.with-nav]="mostrarNavbar">
    <router-outlet></router-outlet>

    <footer class="footer-qoribex">
      <p>© 2026 QORIBEX | TODOS LOS DERECHOS RESERVADOS</p>
    </footer>
  </main>

</div>
